; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

;-----------------------------------------------------------------------------
; The project was successfully compiled with version 55.03.37 of the
; pioarduino-espressif32 platform released on February 11, 2026.
; This was tested using the pioarduinoIDE extension (v1.3.18) which is a fork
; of the PlatformioIDE extension. It is available in the Visual Studio Code
; marketplace and in the VSCodium marketplace. The sketch was tested
; using VSCodium (Version 1.112.01907).                         April 21, 2026
;-----------------------------------------------------------------------------

[platformio]
default_envs = esp32c3_oled_mini   ; SS = 0
;default_envs = mini_esp32c3_oled   ; SS = 8

boards_dir = ../boards
lib_dir = ../libraries

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 460800
;build_flags = 
;  -DCORE_DEBUG_LEVEL=0 ; options: 5 verbose, 4 debug, 3 info, 2 error, 1 critical, 0 none (default)
;upload_port = /dev/ttyACM0
;monitor_port = /dev/ttyACM0

; SPI SS signal attached to GPIO 0
[env:esp32c3_oled_mini]
board = esp32c3_oled_mini

; SPI SS signal attached to GPIO 8
[env:mini_esp32c3_oled]
board = mini_esp32c3_oled
